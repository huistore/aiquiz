<!DOCTYPE html>
<html lang='zh-CN'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>危险人格心理测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#FFF5F0,#FFF0F5,#FFEDE1,#FFF5F0);min-height:100vh;color:#2D1B13}
.container{max-width:430px;margin:0 auto;padding:20px 0;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:16px}
.card{background:rgba(255,255,255,0.75);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-radius:24px;padding:24px;box-shadow:0 8px 32px rgba(139,90,60,0.08);width:398px;max-width:calc(100vw - 32px)}
.home{text-align:center;flex:1}
.crystal{font-size:72px;margin-bottom:16px;line-height:1;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-size:28px;font-weight:800;color:#2D1B13;line-height:1.3;margin-bottom:8px}
.sub{font-size:16px;color:#8B6B5A;margin-bottom:32px}
.desc-card{background:rgba(255,255,255,0.7);border-radius:24px;padding:24px;margin-bottom:32px;text-align:center;width:100%}
.desc-card p{font-size:15px;color:#6B4A3A;line-height:1.8;margin-bottom:8px}
.desc-card p:last-child{margin-bottom:0}
.btn-start,.btn-next{background:linear-gradient(135deg,#E8435D,#FF8A6E);color:#fff;border:none;border-radius:50px;padding:16px 48px;font-size:18px;font-weight:700;cursor:pointer;transition:all .3s;width:100%;max-width:280px}
.btn-start:hover,.btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,67,93,0.3)}
.btn-next:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.progress-text{font-size:14px;color:#8B6B5A;margin-bottom:8px;text-align:center}
.progress-bar{height:6px;background:#FFE8E0;border-radius:3px;overflow:hidden;width:100%;margin-bottom:16px}
.progress-fill{height:100%;background:linear-gradient(90deg,#E8435D,#FF8A6E);border-radius:3px;transition:width .5s ease}
.q-num{font-size:14px;color:#E8435D;font-weight:600;margin-bottom:8px}
.q-title{font-size:18px;font-weight:700;color:#2D1B13;line-height:1.5;margin-bottom:24px}
.option{display:block;width:100%;padding:16px 20px;margin-bottom:12px;background:#fff;border:2px solid #FFE8E0;border-radius:16px;font-size:15px;color:#2D1B13;cursor:pointer;transition:all .2s;text-align:left}
.option:hover{border-color:#FF9E80;background:#FFF5F0}
.option.selected{border-color:#E8435D;background:#FFF0F0;color:#E8435D;font-weight:600}
.quiz-card{flex:1;display:flex;flex-direction:column;min-height:400px}
.options-wrap{flex:1}
.result-card{text-align:center}
.result-icon{font-size:72px;margin-bottom:16px;line-height:1}
.result-name{font-size:26px;font-weight:800;color:#2D1B13;margin-bottom:4px}
.result-attr{font-size:15px;color:#8B6B5A;margin-bottom:20px}
.result-comment{background:rgba(232,67,93,0.08);border-radius:16px;padding:16px;font-size:15px;color:#6B4A3A;line-height:1.6;margin-bottom:24px;font-style:italic}
.result-analysis{text-align:left;background:rgba(255,255,255,0.6);border-radius:16px;padding:20px;margin-bottom:24px}
.result-analysis p{font-size:14px;color:#4A3428;line-height:1.9;margin-bottom:12px}
.result-analysis p:last-child{margin-bottom:0}
.radar-wrap{width:100%;max-width:320px;margin:0 auto 24px}
.share-text{font-size:15px;color:#E8435D;font-weight:600;margin-bottom:24px;padding:16px;background:rgba(232,67,93,0.06);border-radius:16px}
.activate-wrap{width:100%;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;text-align:center}
.activate-wrap .icon{font-size:56px}
.activate-wrap h2{font-size:20px;font-weight:700;color:#2D1B13}
.activate-wrap p{font-size:14px;color:#8B6B5A;line-height:1.6}
.activate-input{width:100%;padding:14px 16px;border:2px solid #FFE8E0;border-radius:16px;font-size:16px;text-align:center;outline:none;transition:border-color .2s;color:#2D1B13;background:#fff;letter-spacing:2px}
.activate-input:focus{border-color:#E8435D}
.activate-input::placeholder{letter-spacing:0;color:#C0A090}
.activate-err{font-size:13px;color:#E8435D;display:none}
.activate-btn{background:linear-gradient(135deg,#E8435D,#FF8A6E);color:#fff;border:none;border-radius:50px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;width:100%;max-width:200px}
.activate-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,67,93,0.3)}
.btn-restart{background:linear-gradient(135deg,#E8435D,#FF8A6E);color:#fff;border:none;border-radius:50px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;display:inline-block}
.btn-restart:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,67,93,0.3)}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.scores-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px}
.score-tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class='container' id='app'></div>
<script>

const questions = [
  {order:1, title:`如果第二天需要早起，你会定几个闹钟？`, options:[`1 个，响了就走`,`2 个，给自己留点缓冲`,`3 个，怕自己根本醒不过来`,`4 个以上，主打一个和自己拉锯`], scores:[`dou_s`,`controller`,`self_punisher`,`dou_m`]},
  {order:2, title:`多年未见的老朋友约你见面，你会选哪里？`, options:[`氛围不错的小酒吧`,`咖啡馆或奶茶店`,`直接约饭，边吃边聊`,`哪里都行，对方定就好`], scores:[`npd`,`schemer`,`bpd`,`rampage`]},
  {order:3, title:`你同意“爱情到最后都会变成亲情”这句话吗？`, options:[`同意，关系总会进入稳定期`,`不同意，爱就该一直有火花`,`没想法，遇到人再说`,`看情况，有的人会，有的人不会`], scores:[`controller`,`dou_s`,`yandere`,`self_punisher`]},
  {order:4, title:`你觉得缘分是？`, options:[`上天注定的`,`靠自己争取的`,`虚无缥缈的`,`无所谓，来了就接着`], scores:[`bpd`,`controller`,`npd`,`dou_m`]},
  {order:5, title:`你对做饭这件事有兴趣吗？`, options:[`完全没兴趣，能不做就不做`,`有一点兴趣，但主要看心情`,`非常感兴趣，愿意慢慢研究`,`偶尔尝试，失败了也能接受`], scores:[`dou_s`,`schemer`,`self_punisher`,`rampage`]},
  {order:6, title:`如果可以给过去的自己一条建议，你会说什么？`, options:[`一定要努力学习，别浪费机会`,`不要太一意孤行，三思而后行`,`珍惜和家人在一起的时间`,`不要为了任何一个人而卑微`], scores:[`controller`,`yandere`,`dou_m`,`npd`]},
  {order:7, title:`如果有人借了你一笔小钱，后来忘记还了，你会？`, options:[`会主动问，没什么不好意思的`,`不问，有点开不了口`,`偶尔侧面提醒一下`,`表面不说，但心里已经记账了`], scores:[`controller`,`dou_m`,`schemer`,`bpd`]},
  {order:8, title:`分手之后，你还能和前任做朋友吗？`, options:[`能，过去了就过去了`,`不能，没必要再联系`,`看情况，要看分得体不体面`,`视心情而定，我说了算`], scores:[`dou_s`,`self_punisher`,`yandere`,`npd`]},
  {order:9, title:`排队等餐太久，你会怎么做？`, options:[`直接不等了，换一家`,`改天再来，不想浪费心情`,`先看看别人点了什么，再决定`,`找熟人或想办法快一点`], scores:[`rampage`,`bpd`,`dou_m`,`npd`]},
  {order:10, title:`你和朋友发生冲突，你通常会？`, options:[`马上摊牌，别憋着`,`冷处理，先让自己冷静`,`闷在心里，越想越难受`,`用玩笑化解，但心里未必真过去`], scores:[`dou_s`,`self_punisher`,`bpd`,`yandere`]},
  {order:11, title:`遇到喜欢的人，你会怎么做？`, options:[`主动靠近，喜欢就别装`,`暗示等待，看对方有没有反应`,`静观其变，怕自己太主动`,`假装不在意，但其实一直观察`], scores:[`dou_s`,`yandere`,`self_punisher`,`schemer`]},
  {order:12, title:`工作或学习中犯错时，你会？`, options:[`承认问题，然后赶紧修正`,`先稳住场面，别让自己太难看`,`反复自责，觉得自己不该这样`,`表面没事，私下疯狂补救`], scores:[`controller`,`npd`,`self_punisher`,`bpd`]},
  {order:13, title:`面对突如其来的变化，你会？`, options:[`立刻行动，先处理再说`,`拖一拖，看看事情会不会自己过去`,`想找人商量，不想一个人扛`,`表面随和，心里开始疯狂演算`], scores:[`rampage`,`dou_m`,`bpd`,`yandere`]},
  {order:14, title:`你喜欢的电影类型更接近哪一种？`, options:[`爱情片，最好有点拉锯`,`动作片，节奏快一点`,`惊悚片，越刺激越清醒`,`反转片，最好谁都猜不到结局`], scores:[`yandere`,`dou_s`,`self_punisher`,`rampage`]},
  {order:15, title:`遇到陌生人搭讪，你会？`, options:[`先观察对方目的，再决定态度`,`礼貌回应，但保持距离`,`下意识回避，有点不自在`,`直接开玩笑，把节奏带走`], scores:[`schemer`,`controller`,`bpd`,`rampage`]},
  {order:16, title:`在聚会中，你更倾向于？`, options:[`主导话题，让场子别冷`,`安静旁听，别人聊我就听`,`找一两个熟人小范围聊天`,`观察每个人的反应，心里默默打分`], scores:[`npd`,`dou_m`,`yandere`,`schemer`]},
  {order:17, title:`朋友背后议论你，你会？`, options:[`当面问清楚，别在背后搞事`,`假装没事，但心里会介意`,`先收集信息，看看到底谁说的`,`自省一下，是不是自己哪里做得不好`], scores:[`controller`,`dou_m`,`schemer`,`bpd`]},
  {order:18, title:`喜欢的东西被别人抢先拿走，你会？`, options:[`强势争取，喜欢就要拿到`,`算了，反正也不是非要不可`,`暗中较劲，下次一定抢回来`,`直接炸毛，凭什么又是我错过`], scores:[`dou_s`,`self_punisher`,`schemer`,`rampage`]},
  {order:19, title:`你更喜欢哪种社交方式？`, options:[`面对面聊，直接看反应`,`视频或语音，有距离但不冷谈`,`文字聊天，方便慢慢表达`,`独自活动，别人别太打扰我`], scores:[`dou_s`,`dou_m`,`yandere`,`npd`]},
  {order:20, title:`别人给你建议时，你通常会？`, options:[`有道理就采纳`,`部分采纳，但保留自己的想法`,`不爱听，尤其是对方太自以为是的时侯`,`表面听着，心里已经开始反驳`], scores:[`controller`,`yandere`,`npd`,`rampage`]}
];

const results = [
  {id:`dou_s`, name:`抖 S`, attr:`抖 S（主）+ 病娇 + 腹黑怪`, comment:`心里有条线，别人别乱碰，我全都看在眼里。`, radar:{dou_s:100,dou_m:12,yandere:89,schemer:86,self_punisher:31,controller:71,rampage:67,bpd:28,npd:64}, radar_text:`你不是不好惹，你是只让值得的人靠近。`, share_text:`别试探我，我脾气好是因为你还没碰到线。`, analysis:[`你是一个有精神洁癖的人，对自己喜欢的人和事物有强烈掌控欲。生活中，你有自己的规则和节奏，暗地里精于心机，别人永远看不透你的底牌。你只对真正值得的人展现温柔，其余的全靠套路和智慧。`,`在感情里，你不是那种轻易上头、随便交付真心的人。你会观察、会试探、会判断对方值不值得。一旦你真的认定一个人，你的占有欲和保护欲就会同时上线。嘴上可能很淡，心里却已经把边界画得清清楚楚：谁能靠近，谁该滚远，你比谁都明白。`,`你不喜欢被别人安排，更讨厌有人对你指手画脚。别人以为你只是有点强势，其实你真正危险的地方在于：你能忍，但你不会忘；你能笑，但你不一定真的原谅。你很少无意义发疯，因为你更喜欢在合适的时机精准出手。`,`你的危险感不是大吵大闹，而是“我表面没事，但我什么都知道”。别人如果真碰到你的底线，就会发现你不是没脾气，只是平时懒得浪费火力。`]},
  {id:`dou_m`, name:`抖 M`, attr:`抖 M（主）+ 自虐狂 + BPD（边缘型人格）`, comment:`被掌控也甘之如饴，虐自己一点都不冤。`, radar:{dou_s:36,dou_m:100,yandere:62,schemer:43,self_punisher:91,controller:48,rampage:19,bpd:88,npd:25}, radar_text:`你不是软弱，你只是太容易把感受放大。`, share_text:`我不是恋爱脑，我只是很容易被情绪拿捏。`, analysis:[`你容易顺从和依赖他人，情绪波动明显。你在感情中深情投入，但也会自我牺牲。被掌控和挑战刺激你，你懂得从压力和微虐中获得奇妙满足感。`,`你不是没有主见，只是很多时候你会下意识先照顾别人的情绪。别人一句话、一个态度变化，就可能让你想很多。你嘴上说“没事”，心里可能已经把所有细节翻来覆去复盘了三遍。你很容易为关系投入，也很容易在关系里消耗自己。`,`你的危险点在于：你明明知道有些事情会让自己难受，却还是忍不住靠近。你对强烈情绪有一种奇怪的依赖感，平淡太久反而会觉得不真实。你不是喜欢痛苦，而是某些拉锯、在意、患得患失，会让你觉得“我还活着，我还在认真感受”。`,`在别人眼里，你可能温柔、好说话、有点软。但真正了解你的人会知道，你内心的小剧场非常热闹。你可以为了喜欢的人降低姿态，也可以在积攒太久之后突然情绪决堤。`]},
  {id:`yandere`, name:`病娇`, attr:`病娇（主）+ 控制狂 + NPD（自恋型人格）`, comment:`爱得深、掌控得狠，顺便自带光环。`, radar:{dou_s:66,dou_m:32,yandere:100,schemer:49,self_punisher:55,controller:92,rampage:28,bpd:73,npd:84}, radar_text:`你不是占有欲强，你只是无法接受自己不是唯一。`, share_text:`我可以很甜，但前提是你只能偏向于我。`, analysis:[`对你喜欢的人，你的占有欲几乎病态，同时在生活中喜欢掌控一切。你自信、果断，有自己的规则和计划，别人总是你的背景板。感情和行动都带有强烈目的性。`,`你不是那种随随便便喜欢一个人的类型。你一旦上心，就很难只是浅浅喜欢。你会在意对方的语气、回复速度、朋友圈动态、和谁走得近，甚至能从一点小细节里脑补出完整剧情。你嘴上可能还在装冷静，但心里早就开始拉警报。`,`你的危险点在于：你很难接受“不确定”。模糊关系、忽冷忽热、没有明确回应，这些都会让你非常不舒服。你要的不是普通喜欢，而是明确的偏爱、确定的位置、被坚定选择的感觉。`,`与此同时，你又不是完全卑微型人格。你有自信，也有骄傲。你可以很深情，但你也希望自己在关系里是特别的、被重视的、无法替代的。你不是想控制所有人，你只是很难忍受自己认真对待的人把你当成可有可无。`]},
  {id:`schemer`, name:`腹黑怪`, attr:`腹黑怪（主）+ 暴走人格 + 抖 S`, comment:`冷面笑匠，一炸全场，别人永远猜不到下一步。`, radar:{dou_s:81,dou_m:18,yandere:58,schemer:100,self_punisher:31,controller:74,rampage:83,bpd:42,npd:69}, radar_text:`你不是心眼多，你只是脑子没闲着。`, share_text:`我不说，不代表我不知道。`, analysis:[`你表面冷静，内心心机满满，偶尔暴走，行动力惊人。喜欢套路和策略，观察周围人一举一动，情绪爆发时无人能挡。你的存在总让人既害怕又好奇。`,`你不是那种把情绪全写在脸上的人。很多时候，你看起来只是安静、礼貌、甚至有点好说话，但其实你一直在观察。谁是真心，谁在演，谁说话带刺，谁想占便宜，你心里都记得很清楚。`,`你的危险点在于，你不一定当场反击。你更擅长先收集信息，再选择合适的时机出手。别人以为事情过去了，其实你只是暂时没动。你不是没脾气，你只是觉得没必要把底牌提前亮出来。`,`但你也不是永远冷静。一旦有人反复挑战你的底线，你的暴走人格会突然上线。那时候你就不是阴阳怪气，而是直接让对方知道什么叫“别惹看起来很安静的人”。`]},
  {id:`self_punisher`, name:`自虐狂`, attr:`自虐狂（主）+ 抖 M + 病娇`, comment:`自虐自嗨两不误，虐心又甜心。`, radar:{dou_s:37,dou_m:90,yandere:86,schemer:44,self_punisher:100,controller:58,rampage:22,bpd:76,npd:29}, radar_text:`你不是自虐，你只是太会把难过咽下去。`, share_text:`我嘴上说算了，心里已经碎成二维码。`, analysis:[`你在生活中容易过度投入和自我牺牲，享受顺从与感情波动带来的刺激。你的情感丰富而敏感，默默承受压力，却从中获得独特满足感。`,`你是那种很容易把事情往自己身上揽的人。关系出问题，你先想是不是自己不够好；工作学习出错，你先反复复盘哪里没做好；别人情绪不好，你也容易下意识觉得是不是自己哪里惹到对方。你不是没有脾气，只是习惯先消化自己。`,`你的危险点在于，你对“忍耐”这件事太熟练了。你可以嘴上说没事，心里却已经难受到不行。你可以继续付出，继续照顾别人，继续表现得很正常，但内心早就默默扣血。`,`感情里的你尤其容易上头。你一旦喜欢，就会很认真，很能忍，也很容易因为一点点回应开心很久。别人觉得你太敏感，但其实你只是太在乎。你并不是真的喜欢受伤，你只是太习惯用付出来证明自己值得被爱。`]},

function drawRadar(data) {
  const size = 320, cx = 160, cy = 160, r = 110;
  const n = dimOrder.length;
  const angleStep = (Math.PI*2)/n;
  const maxVal2 = Math.max(...dimOrder.map(d=>typeof data[d]==='number'?data[d]:100));
  let labels2 = ``;
  dimOrder.forEach((d,i)=>{
    const a = -Math.PI/2 + i*angleStep;
    const lx = cx + Math.cos(a)*(r+24);
    const ly = cy + Math.sin(a)*(r+24);
    const anchors = {dou_s:`bottom`,dou_m:`bottom`,yandere:`middle`,schemer:`middle`,self_punisher:`middle`,controller:`middle`,npd:`middle`,bpd:`middle`,rampage:`top`};
    const ta = lx>cx+r-10?'end':lx<cx-r+10?'start':lx<cx-5?'end':lx>cx+5?'start':'middle';
    labels2 += `<text x="${lx}" y="${ly}" text-anchor="${ta}" dominant-baseline="${anchors[d]||'middle'}" font-size="11" fill="#666" font-weight="500">${radarLabels[d]}</text>`;
  });
  // Grid
  let grid = ``;
  [0.25,0.5,0.75,1].forEach(pct=>{
    const pr = r * pct;
    let pts = dimOrder.map((d,i)=>{
      const a = -Math.PI/2 + i*angleStep;
      return `${cx+Math.cos(a)*pr},${cy+Math.sin(a)*pr}`;
    }).join(` `);
    grid += `<polygon points="${pts}" fill="none" stroke="#E8E0DC" stroke-width="1"/>`;
  });
  // Data polygon
  let pts = dimOrder.map((d,i)=>{
    const a = -Math.PI/2 + i*angleStep;
    const val = typeof data[d]==='number' ? data[d] : 100;
    const pr = r * (val/maxVal2);
    return `${cx+Math.cos(a)*pr},${cy+Math.sin(a)*pr}`;
  }).join(` `);
  // Axes
  let axes = dimOrder.map((d,i)=>{
    const a = -Math.PI/2 + i*angleStep;
    return `<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="#E8E0DC" stroke-width="1"/>`;
  }).join(``);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${axes}${grid}<polygon points="${pts}" fill="rgba(232,67,93,0.2)" stroke="#E8435D" stroke-width="2"/><circle cx="${cx}" cy="${cy}" r="3" fill="#E8435D"/>${labels2}</svg>`;
}

      <div class="icon">🔓</div>
      <h2>输入激活码</h2>
      <p>请输入你的激活码解锁完整测评报告</p>
      <input class="activate-input" id="acInput" type="text" placeholder="请输入激活码" maxlength="20" autocomplete="off">
      <div class="activate-err" id="acErr">激活码无效或已达使用次数上限</div>
      <button class="activate-btn" onclick="doActivate()">验证</button>
      <p style="font-size:12px;color:#C0A090">剩余码数：${_sa.length}</p>
    </div></div>`;
  } else {
    app.innerHTML=`<div class="container fade-in"><div class="card activate-wrap">
      <div class="icon">🔓</div>
      <h2>输入订单号验证</h2>
      <p>请输入你的<b>订单号</b>验证身份<br>验证通过后 ${EXPIRY_HOURS}h 内可随时查看</p>
      <input class="activate-input" id="acInput" type="text" placeholder="请输入订单号" maxlength="${ORDER_MAX_LEN}" autocomplete="off">
      <div class="activate-err" id="acErr">订单号格式不正确或已过期</div>
      <button class="activate-btn" onclick="doActivate()">验证</button>
      <p style="font-size:12px;color:#C0A090">每张订单仅限一个设备使用</p>
    </div></div>`;
  }
  setTimeout(()=>{try{document.getElementById('acInput').focus()}catch(e){}},100);
}

function doActivate(){
  const inp=document.getElementById('acInput').value.trim();
  const err=document.getElementById('acErr');
  if(isCodeMode()){
    const key=inp.toUpperCase();
    const hit=codes.find(c=>c.k===key);
    if(!hit){err.style.display='block';return}
    try{
      const u=JSON.parse(localStorage.getItem('_du_'+hit.k)||'0');
      if(u>=hit.n){err.style.display='block';return}
      localStorage.setItem('_du_'+hit.k,JSON.stringify(u+1));
      setActivated();
      state='result';render();
    }catch(e){err.style.display='block'}
  } else {
    // Order mode: validate format
    const valid = ORDER_ONLY_NUMERIC
      ? /^\d+$/.test(inp) && inp.length>=ORDER_MIN_LEN && inp.length<=ORDER_MAX_LEN
      : /^[a-zA-Z0-9]+$/.test(inp) && inp.length>=ORDER_MIN_LEN && inp.length<=ORDER_MAX_LEN;
    if(!valid){err.style.display='block';return}
    setActivated(inp);
    state='result';render();
  }
}

render();

</script>
</body>
</html>
